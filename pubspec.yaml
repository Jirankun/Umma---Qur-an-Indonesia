name: umma
description: "Umma - Qur'an Indonesia"
publish_to: 'none'
version: 1.0.2+2

environment:
  sdk: ^3.12.1

dependencies:
  flutter:
    sdk: flutter
  
  # Cupertino Icons untuk iOS-style icons
  cupertino_icons: ^1.0.8
  
  # State Management
  provider: ^6.1.2
  
  # HTTP & API
  http: ^1.2.2

  # Local Storage
  shared_preferences: ^2.3.4

  # Location & Sensors
  geolocator: ^13.0.2
  sensors_plus: ^6.1.1
  
  # Notifications
  workmanager: ^0.9.0+3
  
  # Date & Time
  intl: ^0.20.2
  
  # Audio for Quran
  audioplayers: ^6.1.0
  audio_service: ^0.18.18
  audio_session: ^0.1.21
  
  # QR Code for P2P
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  
  # Permissions
  permission_handler: ^11.3.1

  # File picker for data export/import
  path_provider: ^2.1.5
  hijri_date: ^1.0.1
  url_launcher: ^6.3.2
  share_plus: ^12.0.2
  awesome_notifications: ^0.11.0
  file_picker: ^8.0.0
  image_picker: ^1.2.2
  wakelock_plus: ^1.5.2
  video_player: ^2.11.1
  package_info_plus: ^9.0.0
  android_alarm_manager_plus: ^5.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/audio/
    - assets/video/
    - assets/update/
    - assets/onboarding_icon.png

  fonts:
    - family: Lateef
      fonts:
        - asset: assets/font/Lateef-Regular.ttf

    - family: ScheherazadeNew
      fonts:
        - asset: assets/font/ScheherazadeNew-Regular.ttf
